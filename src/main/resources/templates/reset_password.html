<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Reset Password</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container-table {
            table-layout: fixed;
            background-color: #f4f4f4;
        }

        .content-box {
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            margin: 0;
            color: #34495e;
            font-size: 28px;
            font-weight: bold;
        }

        .greeting,
        p {
            color: #333333;
            font-size: 16px;
            line-height: 1.6;
        }

        .instruction {
            margin-bottom: 25px;
            color: #666666;
        }

        .activation-code span {
            display: inline-block;
            padding: 10px 20px;
            background-color: #ecf0f1;
            color: #34495e;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            border: 1px dashed #bdc3c7;
        }

        .activation-link a {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            color: #ffffff;
            background-color: #e74c3c;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #e74c3c;
            transition: background-color 0.3s ease;
        }

        .footer p {
            color: #999999;
            font-size: 12px;
            margin: 0;
        }
    </style>
</head>

<body class="body-style">

    <table border="0" cellpadding="0" cellspacing="0" width="100%" class="container-table">
        <tr>
            <td align="center" style="padding: 20px 0;">

                <table border="0" cellpadding="0" cellspacing="0" width="100%" class="content-box">

                    <tr>
                        <td align="center" class="header" style="padding: 30px 40px 10px 40px;">
                            <h1>Restablecer Contraseña</h1>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 20px 40px;">
                            <p class="greeting" th:text="'Hola ' + ${username} + ','"></p>

                            <p class="instruction">
                                Has solicitado restablecer tu contraseña. Usa el siguiente código para continuar:
                            </p>

                            <div class="activation-code" style="text-align: center; margin-bottom: 30px;">
                                <span th:text="${activation_code}"></span>
                            </div>

                            <p class="instruction">
                                Si no solicitaste este cambio, puedes ignorar este correo de forma segura.
                            </p>

                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 0 40px 40px 40px;">
                            <!-- Optional link if you have a frontend reset page -->
                            <div class="activation-link">
                                <a th:href="${confirmationUrl}" target="_blank">Restablecer Contraseña</a>
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td class="footer"
                            style="padding: 20px 40px; border-top: 1px solid #eeeeee; text-align: center;">
                            <p>
                                Este código expirará en 15 minutos.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
