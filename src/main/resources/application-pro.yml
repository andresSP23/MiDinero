spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database: PostgreSQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_SMTP_USER}
    password: ${BREVO_SMTP_PASS}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false
          ssl:
            trust: smtp-relay.brevo.com

server:
  port: 8081

app:
  mail:
    from: ${MAIL_FROM}

application:
  mailing:
    frontend:
      activation-url: ${FRONTEND_URL}/activate-account
      reset-password-url: ${FRONTEND_URL}/reset-password
  cors:
    allowed-origin: ${CORS_ORIGIN}