name: Deploy Mi Dinero

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build --no-cache -t ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest .

      - name: Subir imagen a Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop mi-dinero || true
            docker rm mi-dinero || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest
            docker run -d \
              --name mi-dinero \
              --restart unless-stopped \
              -p 8081:8081 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e BREVO_SMTP_USER=${{ secrets.BREVO_SMTP_USER }} \
              -e BREVO_SMTP_PASS=${{ secrets.BREVO_SMTP_PASS }} \
              -e MAIL_FROM=${{ secrets.MAIL_FROM }} \
              -e FRONTEND_URL=${{ secrets.FRONTEND_URL }} \
              -e CORS_ORIGIN=${{ secrets.CORS_ORIGIN }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest
            docker image prune -f