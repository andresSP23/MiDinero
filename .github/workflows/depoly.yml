name: Deploy Mi Dinero

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest .

      - name: Subir imagen a Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Detener y borrar contenedor antiguo si existe
            docker stop mi-dinero || true
            docker rm mi-dinero || true

            # Traer la nueva imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest

            # Correr el contenedor con el .env de producción
            docker run -d \
              --name mi-dinero \
              -p 8081:8081 \
              --env-file /home/ec2-user/app/.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/mi-dinero:latest